name: Release

# Runs after CI passes on main. go-semantic-release analyzes conventional
# commits since the last tag to determine whether a release is warranted,
# and if so, computes the next semantic version, writes CHANGELOG.md and
# VERSION, creates the git tag, and pushes back to main with [skip ci].
# The resulting v* tag is what `go get github.com/jedi-knights/repometa@vX.Y.Z`
# resolves; the accompanying GitHub Release surfaces changelog notes.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Ensure only one release runs at a time. cancel-in-progress: false queues
# the second run rather than dropping it; once the first completes and the
# tag exists, semantic-release will find no new commits and exit as a no-op.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Only run when CI passed — skip if it failed or was cancelled.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history is required for commit analysis across all tags.
          fetch-depth: 0
          # Use PAT so go-semantic-release can push the VERSION/CHANGELOG
          # commit and the tag back to main.
          token: ${{ secrets.GH_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.name "semantic-release-bot"
          git config --global user.email "semantic-release-bot@users.noreply.github.com"

      - uses: jedi-knights/go-semantic-release@v0
        with:
          github_token: ${{ secrets.GH_TOKEN }}
