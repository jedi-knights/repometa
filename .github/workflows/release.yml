name: Release

# Runs after CI passes on main. go-semantic-release analyzes conventional
# commits since the last tag to determine whether a release is warranted,
# and if so, computes the next semantic version, writes CHANGELOG.md and
# VERSION, creates the git tag, and pushes back to main with [skip ci].
# The resulting v* tag is what `go get github.com/jedi-knights/repometa@vX.Y.Z`
# resolves; the accompanying GitHub Release surfaces changelog notes.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Ensure only one release runs at a time. cancel-in-progress: false queues
# the second run rather than dropping it; once the first completes and the
# tag exists, semantic-release will find no new commits and exit as a no-op.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Only run when CI passed — skip if it failed or was cancelled.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history is required for commit analysis across all tags.
          fetch-depth: 0
          # Use PAT so go-semantic-release can push the VERSION/CHANGELOG
          # commit and the tag back to main.
          token: ${{ secrets.GH_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.name "semantic-release-bot"
          git config --global user.email "semantic-release-bot@users.noreply.github.com"

      - uses: jedi-knights/go-semantic-release@v0
        with:
          github_token: ${{ secrets.GH_TOKEN }}

      # pkg.go.dev is a read-through cache: it does not proactively
      # re-crawl a module when a new tag is pushed, only when someone
      # asks for that version. Left alone, the module page can display
      # a stale version for hours after a release lands. This step
      # nudges the Go module proxy (which pkg.go.dev crawls from) and
      # then the pkg.go.dev fetch endpoint. It is a no-op when
      # semantic-release did not cut a new tag.
      - name: Refresh pkg.go.dev for new tag
        run: |
          set -eu

          TAG=$(git tag --points-at HEAD --list 'v*' | tail -1)
          if [ -z "$TAG" ]; then
            echo "no v* tag at HEAD — nothing to refresh"
            exit 0
          fi

          MODULE=$(awk '/^module / {print $2; exit}' go.mod)
          if [ -z "$MODULE" ]; then
            echo "::warning::could not read module path from go.mod"
            exit 0
          fi

          PROXY_URL="https://proxy.golang.org/${MODULE}/@v/${TAG}.info"
          echo "Refreshing pkg.go.dev for ${MODULE}@${TAG}"

          # Poll the proxy up to 3 attempts with 15s backoff. GitHub's
          # tag notification to proxy.golang.org is normally fast but not
          # instantaneous — the first attempt after a fresh push can 404.
          # Bound: MAX_PROXY_ATTEMPTS=3, MAX_TOTAL_WAIT_SECONDS=30.
          for attempt in 1 2 3; do
            if curl -sfL "$PROXY_URL" > /dev/null; then
              echo "proxy has ${TAG} (attempt ${attempt})"
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "::warning::proxy did not see ${TAG} after 3 attempts — pkg.go.dev will pick it up eventually"
              exit 0
            fi
            sleep 15
          done

          # Best-effort poke at pkg.go.dev. HTTP 408 is the expected
          # response — the fetch is queued asynchronously and completes
          # server-side within a few minutes. Any non-2xx is treated as
          # informational, never as a workflow failure.
          curl -s -o /dev/null -w "pkg.go.dev fetch: HTTP %{http_code}\n" \
            -X POST "https://pkg.go.dev/fetch/${MODULE}@${TAG}" || true
